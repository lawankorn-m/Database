const allColumns = Object.keys(data[0]);
const numericCols = allColumns.filter(c => typeof data[0][c] === "number");

let filteredData = [...data];
let sortConfig = { key: null, direction: 'asc' };


/* ================= COLUMN CHECKBOX ================= */

function createColumnSelector(){
  const container = document.getElementById("columnSelector");
  container.innerHTML="";

  allColumns.forEach(col=>{
    const label=document.createElement("label");
    label.innerHTML=`
      <input type="checkbox" class="columnCheck" value="${col}" checked>
      ${col}
    `;
    container.appendChild(label);
  });
}

function getSelectedColumns(){
  return [...document.querySelectorAll(".columnCheck:checked")]
         .map(cb=>cb.value);
}


/* ================= FILTER ================= */

function createFilters() {

const container = document.getElementById("dynamicFilters");
container.innerHTML = "";

/* Name input — äÁčÁŐ hint */
container.innerHTML += `
<label><b>Name</b> (CHEMBL_ID)
<input type="text" id="filter_Name"> 
</label><br>
`;

/* SMILES input */
container.innerHTML += `
<label><b>SMILES</b>
<input type="text" id="filter_SMILES" style="width:400px">
</label><br>
`;

allColumns.forEach(col => {

if (col === "Name" || col === "SMILES") return;

if (numericCols.includes(col)) {

const values = data.map(d => d[col]);
const minVal = Math.min(...values);
const maxVal = Math.max(...values);

container.innerHTML += `
<label><b>${col}</b>
From <input type="number" step="any" id="min_${col}" value="${minVal}" style="width:80px">
To <input type="number" step="any" id="max_${col}" value="${maxVal}" style="width:80px">
</label><br>
`;

} else {

const unique = [...new Set(data.map(d => d[col]))];
let options = `<option value="">All</option>`;
unique.forEach(v => options += `<option value="${v}">${v}</option>`);

container.innerHTML += `
<label><b>${col}</b>
<select id="filter_${col}">
${options}
</select>
</label><br>
`;

}

});

}



/* ================= FILTER ACTION ================= */

function filterData(){

const nameInput=document.getElementById("filter_Name").value.trim().toUpperCase();
const SMILESInput=document.getElementById("filter_SMILES").value.trim().toLowerCase();

filteredData=data.filter(row=>{

if(nameInput && !row.Name.includes(nameInput)) return false;
if(SMILESInput && !row.SMILES.toLowerCase().includes(SMILESInput)) return false;

return allColumns.every(col=>{

if(col==="Name"||col==="SMILES") return true;

if(numericCols.includes(col)){
const min=parseFloat(document.getElementById(`min_${col}`).value);
const max=parseFloat(document.getElementById(`max_${col}`).value);
if(!isNaN(min)&&row[col]<min) return false;
if(!isNaN(max)&&row[col]>max) return false;
}else{
const selected=document.getElementById(`filter_${col}`).value;
if(selected && row[col]!==selected) return false;
}
return true;
});
});

showTable();
}



/* ================= TABLE ================= */

function showTable(){

const selectedCols=getSelectedColumns();
const thead=document.getElementById("tableHeader");
const tbody=document.querySelector("#resultTable tbody");

thead.innerHTML="";
tbody.innerHTML="";

if(filteredData.length===0){
  tbody.innerHTML="<tr><td colspan='999'>Not Found</td></tr>";
  document.getElementById("resultTable").style.display="table";
  return;
}

selectedCols.forEach(col=>{
thead.innerHTML+=`<th onclick="sortByColumn('${col}')">${col}</th>`;
});

filteredData.forEach(row=>{
let tr="<tr>";
selectedCols.forEach(col=>{
tr+=`<td>${row[col]}</td>`;
});
tr+="</tr>";
tbody.innerHTML+=tr;
});

document.getElementById("resultTable").style.display="table";
document.getElementById("downloadBtn").style.display="inline-block";
}



/* ================= CLEAR ================= */

function clearFilters(){
document.getElementById("filter_Name").value="";
document.getElementById("filter_SMILES").value="";
document.getElementById("resultTable").style.display="none";
document.getElementById("downloadBtn").style.display="none";
}



/* ================= EXPORT ================= */

function downloadCSV(){

if(filteredData.length===0){
alert("No data to export");
return;
}

const selectedCols=getSelectedColumns();

const rows=filteredData.map(row=>
selectedCols.map(h=>`"${row[h]}"`)
);

const csv=
selectedCols.join(",")+"\n"+
rows.map(r=>r.join(",")).join("\n");

const blob=new Blob([csv],{type:"text/csv"});
const link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="PXR_filtered.csv";
link.click();
}



/* ================= INIT ================= */

window.onload=function(){
createFilters();
createColumnSelector();
};
