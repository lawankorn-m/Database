data.forEach(d => {
  if(d.IC50 !== undefined){
    d.IC50 = String(d.IC50);
  }
});
const allColumns = Object.keys(data[0]);
let filteredData = [...data];

let sortState = { column:null, direction:"asc" };

/* ===== DESCRIPTOR TABLE ===== */

function createColumnToggles(){
  const table = document.getElementById("descriptorTable");
  table.innerHTML = "";
  const colsPerRow = 4;
  let row, colIndex = 0;

  allColumns.forEach(col=>{
    if(colIndex % colsPerRow === 0) row = table.insertRow();
    const cell = row.insertCell();
    cell.innerHTML =
      `<label>
        <input type="checkbox" class="columnToggle" value="${col}" checked>
        ${col}
      </label>`;
    colIndex++;
  });
}

/* ===== FILTERS ===== */

function createMinFilters(){
  const container = document.getElementById("minFilters");
  container.innerHTML = "";

  allColumns.forEach(col=>{

    if(col === "SMILES"){
      container.innerHTML += `
      <label><b>${col}:</b>
      <input type="text" id="filter_SMILES" placeholder="Search SMILES" style="width:400px">
      </label><br>`;
    }

    else if(col === "IC50"){
      const uniqueValues = [...new Set(data.map(d=>d[col]))];
      let options = `<option value="">All</option>`;
      uniqueValues.forEach(v=> options += `<option value="${v}">${v}</option>`);

      container.innerHTML += `
      <label><b>${col}:</b>
      <select id="filter_${col}">
      ${options}
      </select></label><br>`;
    }

    else if(typeof data[0][col] === "number"){
      const values = data.map(d=>d[col]);
      const min = Math.min(...values);
      const max = Math.max(...values);

      container.innerHTML += `
      <label><b>${col}:</b>
      From <input type="number" step="any" id="min_${col}" value="${min}" style="width:80px">
      To <input type="number" step="any" id="max_${col}" value="${max}" style="width:80px">
      </label><br>`;
    }

    else if(col === "DataType" || col === "Activity"){
      const uniqueValues = [...new Set(data.map(d=>d[col]))];
      let options = `<option value="">All</option>`;
      uniqueValues.forEach(v=> options += `<option value="${v}">${v}</option>`);

      container.innerHTML += `
      <label><b>${col}:</b>
      <select id="filter_${col}">
      ${options}
      </select></label><br>`;
    }

  });
}

/* ===== FILTER LOGIC ===== */

function filterData(){

  const smilesInput = document.getElementById("filter_SMILES")?.value.trim().toLowerCase();

  filteredData = data.filter(row=>{

    if(smilesInput){
      if(!row.SMILES.toLowerCase().includes(smilesInput)) return false;
    }

    for(const col of allColumns){

      if(col === "SMILES") continue;

      /* ===== FIX IC50 ăËéŕ»çą dictionary-based ŕ·čŇąŃéą ===== */
      if(col === "IC50"){
        const val = document.getElementById("filter_IC50")?.value;
        if(val && row[col] !== val) return false;
        continue; // ĘÓ¤Ń­ÁŇˇ äÁčăËéä»ŕ˘éŇ numeric block
      }

      /* ===== numeric filter ===== */
      if(typeof row[col] === "number"){
        const min = document.getElementById(`min_${col}`)?.value;
        const max = document.getElementById(`max_${col}`)?.value;

        if(min && row[col] < parseFloat(min)) return false;
        if(max && row[col] > parseFloat(max)) return false;
      }

      /* ===== categorical filter ===== */
      else{
        const val = document.getElementById(`filter_${col}`)?.value;
        if(val && row[col] != val) return false;
      }
    }

    return true;
  });

  sortState = { column:null, direction:"asc" };
  showTable();
}
function clearFilters(){ location.reload(); }

/* ===== SORT ===== */

function sortTable(column){

  if(sortState.column === column){
    sortState.direction = sortState.direction === "asc" ? "desc" : "asc";
  } else {
    sortState.column = column;
    sortState.direction = "asc";
  }

  filteredData.sort((a,b)=>{

    let valA = column === "rowIndex" ? data.indexOf(a) : a[column];
    let valB = column === "rowIndex" ? data.indexOf(b) : b[column];

    if(typeof valA === "number"){
      return sortState.direction === "asc" ? valA - valB : valB - valA;
    }

    return sortState.direction === "asc"
      ? String(valA).localeCompare(String(valB))
      : String(valB).localeCompare(String(valA));
  });

  showTable();
}

function getArrow(column){
  if(sortState.column !== column) return "";
  return sortState.direction === "asc" ? "" : "";
}

/* ===== SHOW TABLE ===== */

function getSelectedColumns(){
  return Array.from(document.querySelectorAll(".columnToggle:checked"))
         .map(cb=>cb.value);
}

function showTable(){

  const selectedCols = getSelectedColumns();
  const thead = document.getElementById("tableHeader");
  const tbody = document.querySelector("#resultTable tbody");

  thead.innerHTML = "";
  tbody.innerHTML = "";

  thead.innerHTML += `
    <th onclick="sortTable('rowIndex')">
      No.
      <span class="arrow">${getArrow('rowIndex')}</span>
    </th>`;

  selectedCols.forEach(col=>{
    thead.innerHTML += `
      <th onclick="sortTable('${col}')">
        ${col}
        <span class="arrow">${getArrow(col)}</span>
      </th>`;
  });

  filteredData.forEach((row,index)=>{
    let tr = `<tr><td>${index+1}</td>`;
    selectedCols.forEach(col=> tr += `<td>${row[col]}</td>`);
    tr += "</tr>";
    tbody.innerHTML += tr;
  });

  document.getElementById("resultTable").style.display="table";
  document.getElementById("downloadBtn").style.display="inline-block";
}

/* ===== EXPORT ===== */

function downloadCSV(){

  const selectedCols = getSelectedColumns();
  const headers = ["No.", ...selectedCols];

  const rows = filteredData.map((row,index)=>
    [index+1, ...selectedCols.map(col=>row[col])]
  );

  const csv = headers.join(",")+"\n"+rows.map(r=>r.join(",")).join("\n");

  const blob = new Blob([csv],{type:"text/csv"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "filtered_3CLPro-dataset.csv";
  link.click();
}

window.onload = function(){
  createColumnToggles();
  createMinFilters();
};
